services:
  mysql:
    image: mysql:8.4
    container_name: crm_buhardilla_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-crm_buhardilla}
      MYSQL_USER: ${MYSQL_USER:-crm}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-crmpassword}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - crm_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD:-rootpassword}"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  crm_mysql_data:
